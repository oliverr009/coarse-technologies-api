services:
  - type: web
    name: coarse-technologies-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coarse-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://coarse-technologies.netlify.app
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: coarse-db
    plan: free
    databaseName: coarse_tech
    user: coarse_admin
    ipAllowList: []
